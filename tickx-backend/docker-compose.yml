version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tickx_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: tickx_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: tickx_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata: